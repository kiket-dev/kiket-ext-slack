name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: |
          test -f kiket-extension.yaml
          grep -q 'apiVersion: kiket.dev/v1' kiket-extension.yaml
          grep -q 'kind: Extension' kiket-extension.yaml
          grep -q 'key: kiket-ext-slack' kiket-extension.yaml
          test -f src/index.ts
